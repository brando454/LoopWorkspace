name: TandemKit

options:
  bundleIdPrefix: com.loopandlearn
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  transitivelyLinkDependencies: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_STRICT_CONCURRENCY_CHECKING: minimal

targets:

  TandemKit:
    type: framework
    platform: iOS
    sources:
      - path: TandemKit
        excludes:
          - "**/*.h"
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKit
        FRAMEWORK_SEARCH_PATHS: "$(BUILT_PRODUCTS_DIR) $(inherited)"
    dependencies:
      - framework: LoopKit.framework
        embed: false
        implicit: true

  TandemKitUI:
    type: framework
    platform: iOS
    sources:
      - path: TandemKitUI
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKitUI
        FRAMEWORK_SEARCH_PATHS: "$(BUILT_PRODUCTS_DIR) $(inherited)"
    dependencies:
      - target: TandemKit
        embed: false
      - framework: LoopKit.framework
        embed: false
        implicit: true
      - framework: LoopKitUI.framework
        embed: false
        implicit: true

  TandemKitPlugin:
    type: framework
    platform: iOS
    sources:
      - path: TandemKitPlugin
    info:
      path: TandemKitPlugin/Info.plist
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        WRAPPER_EXTENSION: loopplugin
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKitPlugin
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        FRAMEWORK_SEARCH_PATHS: "$(BUILT_PRODUCTS_DIR) $(inherited)"
    dependencies:
      - target: TandemKit
        embed: true
        codeSign: true
      - target: TandemKitUI
        embed: true
        codeSign: true

  TandemKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TandemKitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKitTests
    dependencies:
      - target: TandemKit
        embed: false
