name: TandemKit

# LoopKit lives in a sibling project inside LoopWorkspace.xcworkspace.
# We depend on its iOS framework target explicitly (target: LoopKit/LoopKit)
# rather than as an `implicit` framework. The explicit target dependency makes
# Xcode build the real LoopKit framework (with its .swiftmodule) and link it,
# and it disambiguates the iOS `LoopKit` target from the `LoopKit-watchOS`
# target in the same project. Implicit-dependency scanning stays OFF in the
# scheme so the deprecated WatchApp Extension is never pulled in.
projectReferences:
  LoopKit:
    path: ../LoopKit/LoopKit.xcodeproj

options:
  bundleIdPrefix: com.loopandlearn
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  transitivelyLinkDependencies: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_STRICT_CONCURRENCY_CHECKING: minimal

targets:

  TandemKit:
    type: framework
    platform: iOS
    sources:
      - path: TandemKit
        excludes:
          - "**/*.h"
    info:
      path: TandemKit/Info.plist
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKit
        FRAMEWORK_SEARCH_PATHS: "$(BUILT_PRODUCTS_DIR) $(inherited)"
    dependencies:
      - target: LoopKit/LoopKit
        embed: false
        link: true

  TandemKitUI:
    type: framework
    platform: iOS
    sources:
      - path: TandemKitUI
    info:
      path: TandemKitUI/Info.plist
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKitUI
        FRAMEWORK_SEARCH_PATHS: "$(BUILT_PRODUCTS_DIR) $(inherited)"
    dependencies:
      - target: TandemKit
        embed: false
      - target: LoopKit/LoopKit
        embed: false
        link: true
      - target: LoopKit/LoopKitUI
        embed: false
        link: true

  TandemKitPlugin:
    type: framework
    platform: iOS
    sources:
      - path: TandemKitPlugin
    info:
      path: TandemKitPlugin/Info.plist
      properties:
        # These keys are how Loop discovers the plugin as a pump manager at
        # runtime. They must be declared here: XcodeGen regenerates Info.plist
        # from this block plus its CFBundle defaults, so any key only present in
        # the checked-in file is dropped on the next `xcodegen generate`.
        NSPrincipalClass: TandemKitPlugin
        com.loopkit.Loop.PumpManagerDisplayName: Tandem Mobi
        com.loopkit.Loop.PumpManagerIdentifier: TandemMobi
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        WRAPPER_EXTENSION: loopplugin
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKitPlugin
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        FRAMEWORK_SEARCH_PATHS: "$(BUILT_PRODUCTS_DIR) $(inherited)"
    dependencies:
      - target: TandemKit
        embed: true
        codeSign: true
      - target: TandemKitUI
        embed: true
        codeSign: true

  TandemKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TandemKitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loopandlearn.TandemKitTests
        # Unit-test bundle has no hand-written Info.plist; let Xcode generate one.
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        FRAMEWORK_SEARCH_PATHS: "$(BUILT_PRODUCTS_DIR) $(inherited)"
    dependencies:
      - target: TandemKit
        embed: false
      - target: LoopKit/LoopKit
        embed: false
        link: true

schemes:
  TandemKit:
    build:
      # Implicit-dependency scanning OFF so Xcode does not pull in the
      # deprecated WatchApp Extension from the full workspace. LoopKit is built
      # because TandemKit/TandemKitTests depend on it explicitly above.
      buildImplicitDependencies: false
      targets:
        TandemKit: all
        TandemKitTests: [test]
    test:
      targets:
        - TandemKitTests
      gatherCoverageData: false
